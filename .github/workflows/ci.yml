name: CI

# Quality gate for pull requests. Previews themselves are built natively by
# Vercel; production deployment lives in deploy-production.yml.
on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Read-only: this workflow only checks out and lints/type-checks the code.
permissions:
  contents: read

jobs:
  verify:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check (Biome)
        run: pnpm lint:ci

      - name: Type check
        run: pnpm check-types

      - name: Unused code & dependencies (Knip)
        run: pnpm knip
